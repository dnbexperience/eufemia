name: MCP Lambda

# Deploy the Eufemia MCP server as an AWS Lambda function.
#
# Triggers:
# - `release` branch and `v*` / `v*.*.*` tags — deploys automatically.
# - Any branch named `**/mcp-server` (e.g. `feat/mcp-server`).
# - `chore/add-terraform` — initial setup branch.
# - `workflow_dispatch` — manual deploy from the Actions tab.
#
# Requires the following GitHub secrets:
# - AWS_DEPLOY_ROLE_ARN: IAM role ARN for OIDC federation
#   (e.g. arn:aws:iam::123456789012:role/eufemia-mcp-deploy)
#
# The IAM role must trust the GitHub OIDC provider and allow:
# lambda, apigateway, iam, logs, route53, acm, s3, dynamodb.
#
# See tools/mcp/README.md for manual deploy instructions.

on:
  push:
    branches:
      - release
      - chore/add-terraform
      - '**/mcp-server'
    tags:
      - 'v*'
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for OIDC federation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: 'package.json'

      - name: Use node_modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: modules-cache
        with:
          path: node_modules
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-

      - name: Install dependencies
        if: steps.modules-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: Typecheck
        run: cd tools/mcp && yarn typecheck

      - name: Run tests
        run: cd tools/mcp && yarn test

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: 'package.json'

      - name: Use node_modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: modules-cache
        with:
          path: node_modules
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-

      - name: Install dependencies
        if: steps.modules-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: Skip if AWS credentials are missing
        id: gate
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [ -z "${AWS_ROLE_ARN:-}" ]; then
            echo "AWS_DEPLOY_ROLE_ARN is not set; skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.gate.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Setup Terraform
        if: steps.gate.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: '~> 1.5'

      - name: Build and deploy
        if: steps.gate.outputs.skip != 'true'
        run: cd tools/mcp && yarn deploy

      - name: Post deploy summary
        if: steps.gate.outputs.skip != 'true'
        run: |
          cd tools/mcp/infra
          ENDPOINT=$(terraform output -raw custom_domain 2>/dev/null || terraform output -raw api_endpoint)
          echo "## MCP Lambda deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Endpoint:** \`${ENDPOINT}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Ref:** \`${{ github.ref_name }}\` (\`${{ github.sha }}\`)" >> "$GITHUB_STEP_SUMMARY"
