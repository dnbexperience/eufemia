name: PR Checks

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-pr-title:
    name: Validate PR title

    runs-on: ubuntu-latest

    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$PR_TITLE" | grep -qE '^release of '; then
            echo "PR title is a release: $PR_TITLE"
          elif echo "$PR_TITLE" | grep -qE '^(fix|feat|chore|docs|style|design|build|ci|refactor|perf|test)(\(.+\))?!?:'; then
            echo "PR title is valid: $PR_TITLE"
          else
            echo "::error::Invalid PR title: '$PR_TITLE'"
            echo ""
            echo "The PR title must follow Conventional Commits format:"
            echo "  type(optional-scope): description"
            echo ""
            echo "Valid types: fix, feat, chore, docs, style, design, build, ci, refactor, perf, test"
            echo ""
            echo "Examples:"
            echo "  fix: correct button alignment"
            echo "  feat(DatePicker): add new validation mode"
            echo "  feat(Button)!: remove deprecated prop"
            exit 1
          fi

  check-breaking-changes:
    name: Check for breaking changes

    runs-on: ubuntu-latest

    steps:
      - name: Fail if any commit contains BREAKING CHANGE
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          commits=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits" --paginate)
          length=$(echo "$commits" | jq 'length')

          for i in $(seq 0 $((length - 1))); do
            sha=$(echo "$commits" | jq -r ".[$i].sha")
            message=$(echo "$commits" | jq -r ".[$i].commit.message")
            subject=$(echo "$message" | head -1)

            if echo "$subject" | grep -qE '^[a-zA-Z]+(\(.+\))?!:'; then
              echo "Commit $sha has a valid breaking change marker in the title: $subject"
              continue
            fi

            if echo "$message" | grep -qiE "^BREAKING[ -]CHANGE:"; then
              echo "::error::Commit $sha contains 'BREAKING CHANGE:' footer in its message:"
              echo "$sha $subject"
              exit 1
            fi
          done

          echo "No breaking changes found."
