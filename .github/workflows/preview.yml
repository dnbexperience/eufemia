name: Deploy Preview

on:
  push:
    branches:
      - '**'
      - '!**--skip-ci'
      - '!**--visual-reports'
      - '!wip/**'
      - '!experiments/**'
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy-preview:
    name: Build and deploy (branch preview)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Git checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: 'package.json'
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn workspace dnb-design-system-portal build:mini

      - name: Deploy to Cloudflare Pages (branch preview)
        id: pages_deploy
        run: |
          set -euo pipefail

          OUTPUT="$(yarn workspace dnb-design-system-portal wrangler pages deploy ./public \
            --project-name eufemia \
            --branch "${{ github.head_ref || github.ref_name }}" \
            --commit-dirty=true)"

          echo "$OUTPUT"

          # Prefer alias URL (stable branch preview URL)
          PREVIEW_URL="$(echo "$OUTPUT" | sed -nE 's/.*Deployment alias URL:\s*(https:\/\/[^ ]+).*/\1/p' | tail -n 1)"

          # Fallback to unique deployment URL if alias isn't present
          if [ -z "$PREVIEW_URL" ]; then
            PREVIEW_URL="$(echo "$OUTPUT" | sed -nE 's/.*Take a peek over at\s*(https:\/\/[^ ]+).*/\1/p' | tail -n 1)"
          fi

          if [ -z "$PREVIEW_URL" ]; then
            echo "Could not extract preview URL from Wrangler output" >&2
            exit 1
          fi

          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post or update preview comment
        if: success() && github.event.pull_request
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.pages_deploy.outputs.preview_url }}
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const marker = "<!-- pages-preview-comment -->";

            const body = [
              marker,
              "**Portal Preview URL:**",
              previewUrl,
                "",
                "```",
                previewUrl,
                "```",
                "",
              "_This comment updates automatically on new commits._",
              ""
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
