name: Verify

on:
  push:
    branches:
      - '**'
      - '!**--skip-ci'
      - '!**--visual-reports'
      - '!wip/**'
      - '!experiments/**'
  pull_request:
    branches:
      - 'portal'
      - 'release'
      - 'beta'
      - 'alpha'
      - 'next'
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GH_EMAIL: ${{ secrets.GH_EMAIL }}
  GH_NAME: ${{ secrets.GH_NAME }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
  FIGMA_ICONS_FILE: ${{ secrets.FIGMA_ICONS_FILE }}

jobs:
  check-pr-title:
    name: Validate PR title
    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$PR_TITLE" | grep -qE '^(fix|feat|chore|docs|style|build|ci|refactor|perf|test)(\(.+\))?!?:'; then
            echo "PR title is valid: $PR_TITLE"
          else
            echo "::error::Invalid PR title: '$PR_TITLE'"
            echo ""
            echo "The PR title must follow Conventional Commits format:"
            echo "  type(optional-scope): description"
            echo ""
            echo "Valid types: fix, feat, chore, docs, style, build, ci, refactor, perf, test"
            echo "" 
            echo "Examples:"
            echo "  fix: correct button alignment"
            echo "  feat(DatePicker): add new validation mode"
            echo "  feat(Button)!: remove deprecated prop"
            exit 1
          fi

  check-breaking-changes:
    name: Check for breaking changes

    runs-on: ubuntu-latest

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Fail if any commit contains BREAKING CHANGE
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMITS=$(git log --format="%H" ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          else
            COMMITS=$(git log --format="%H" -1)
          fi

          for sha in $COMMITS; do
            SUBJECT=$(git log --format="%s" -1 "$sha")
            if echo "$SUBJECT" | grep -qE '^[a-zA-Z]+(\(.+\))?!:'; then
              echo "Commit $sha has a valid breaking change marker in the title: $SUBJECT"
              continue
            fi
            if git log --format="%B" -1 "$sha" | grep -qiE "^BREAKING[ -]CHANGE:"; then
              echo "::error::Commit $sha contains 'BREAKING CHANGE:' footer in its message:"
              git log --format="%H %s%n%b" -1 "$sha"
              exit 1
            fi
          done

          echo "No breaking changes found."

  verify:
    name: Run tests and checks

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: 'package.json'

      - name: Use node_modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: modules-cache
        with:
          path: node_modules
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-

      - name: Install dependencies
        if: steps.modules-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: Audit dependencies
        if: ${{ !contains(github.event.head_commit.message || '', '--skip-audit') && !(github.event.pull_request && contains(github.event.pull_request.title || '', '--skip-audit')) }}
        run: yarn workspace @dnb/eufemia audit:ci

      - name: Run lint
        run: |
          yarn workspace @dnb/eufemia lint:ci
          yarn workspace dnb-design-system-portal lint:ci

      - name: Run type checks
        run: |
          yarn workspace @dnb/eufemia test:types
          yarn workspace dnb-design-system-portal test:types
          yarn workspace eufemia-llm-metadata test:types

      - name: Run tests
        run: |
          yarn workspace @dnb/eufemia test:ci
          yarn workspace dnb-design-system-portal test:ci
          yarn workspace markdown-tables-utils test
          yarn workspace eufemia-llm-metadata test

      - name: Run dependency checks
        run: yarn workspace @dnb/eufemia test:deps

  build-check:
    name: Run build tests

    runs-on: ubuntu-latest

    steps:
      - name: Git checkout (with fetch-depth)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 20 # The "postbuild:ci" method "getCommittedFiles" needs all history

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: 'package.json'

      - name: Use node_modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: modules-cache
        with:
          path: node_modules
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-

      - name: Install dependencies
        if: steps.modules-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: Verify isCI
        run: yarn workspace repo-utils test:ci

      - name: Prebuild Library
        run: yarn workspace @dnb/eufemia prebuild:ci

      - name: Postbuild Library
        run: yarn workspace @dnb/eufemia postbuild:ci

      - name: Check bundle sizes
        env:
          BUNDLEWATCH_GITHUB_TOKEN: ${{ github.token }}
        run: yarn workspace @dnb/eufemia build:size
