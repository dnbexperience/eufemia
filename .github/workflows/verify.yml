name: Verify

on:
  push:
    branches:
      - '**'
      - '!**--skip-ci'
      - '!**--visual-reports'
      - '!wip/**'
      - '!experiments/**'
permissions:
  contents: read
  pull-requests: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_EMAIL: ${{ secrets.GH_EMAIL }}
  GH_NAME: ${{ secrets.GH_NAME }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
  FIGMA_ICONS_FILE: ${{ secrets.FIGMA_ICONS_FILE }}

jobs:
  setup:
    name: Install dependencies

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: 'package.json'

      - name: Use node_modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: modules-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-

      - name: Install dependencies
        if: steps.modules-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

  audit:
    name: Audit dependencies
    needs: setup

    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message || '', '--skip-audit') && !(github.event.pull_request && contains(github.event.pull_request.title || '', '--skip-audit')) }}

    timeout-minutes: 10

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: 'package.json'

      - name: Use node_modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Audit dependencies
        run: yarn workspace @dnb/eufemia audit:ci

  lint:
    name: Run lint
    needs: setup

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: 'package.json'

      - name: Use node_modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Run lint
        run: |
          yarn workspace @dnb/eufemia lint:ci
          yarn workspace dnb-design-system-portal lint:ci

  typecheck:
    name: Run type checks
    needs: setup

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: 'package.json'

      - name: Use node_modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      # Persist TypeScript's incremental build info so unchanged files are
      # skipped on type-check. Unique key per commit + restore-keys pulls the
      # latest prior build info; tsc re-checks only what changed (and falls
      # back to a full check if the cache is missing or stale).
      - name: Use TypeScript build-info cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            packages/dnb-eufemia/tsconfig.tsbuildinfo
            packages/dnb-design-system-portal/tsconfig.tsbuildinfo
            tools/eufemia-llm-metadata/tsconfig.tsbuildinfo
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-tsbuildinfo-${{ github.sha }}
          restore-keys: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-tsbuildinfo-

      - name: Run type checks
        run: |
          yarn workspace @dnb/eufemia test:types
          yarn workspace dnb-design-system-portal test:types
          yarn workspace eufemia-llm-metadata test:types

  test:
    name: Run tests
    needs: setup

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: 'package.json'

      - name: Use node_modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Run tests
        run: |
          yarn workspace @dnb/eufemia test:ci
          yarn workspace dnb-design-system-portal test:ci
          yarn workspace markdown-tables-utils test
          yarn workspace eufemia-llm-metadata test

  deps:
    name: Run dependency checks
    needs: setup

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: 'package.json'

      - name: Use node_modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Run dependency checks
        run: yarn workspace @dnb/eufemia test:deps

  build-check:
    name: Run build tests

    runs-on: ubuntu-latest

    steps:
      - name: Git checkout (with fetch-depth)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 20 # The "postbuild:ci" method "getCommittedFiles" needs all history

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: 'package.json'

      - name: Use node_modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: modules-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-

      - name: Install dependencies
        if: steps.modules-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: Verify isCI
        run: yarn workspace repo-utils test:ci

      - name: Prebuild Library
        run: yarn workspace @dnb/eufemia prebuild:ci

      - name: Postbuild Library
        run: yarn workspace @dnb/eufemia postbuild:ci

      - name: Check bundle sizes
        env:
          BUNDLEWATCH_GITHUB_TOKEN: ${{ github.token }}
        run: yarn workspace @dnb/eufemia build:size
