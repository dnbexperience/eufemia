name: Verify

on:
  push:
    branches:
      - '**'
      - '!**--skip-ci'
      - '!**--visual-reports'
      - '!wip/**'
      - '!experiments/**'
permissions:
  contents: read
  pull-requests: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_EMAIL: ${{ secrets.GH_EMAIL }}
  GH_NAME: ${{ secrets.GH_NAME }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
  FIGMA_ICONS_FILE: ${{ secrets.FIGMA_ICONS_FILE }}

jobs:
  setup:
    name: Install dependencies

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          cache-version: ${{ secrets.CACHE_VERSION }}

  audit:
    name: Audit dependencies
    needs: setup

    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message || '', '--skip-audit') && !(github.event.pull_request && contains(github.event.pull_request.title || '', '--skip-audit')) }}

    timeout-minutes: 10

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          cache-version: ${{ secrets.CACHE_VERSION }}

      - name: Audit dependencies
        run: yarn workspace @dnb/eufemia audit:ci

  lint:
    name: Run lint
    needs: setup

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          cache-version: ${{ secrets.CACHE_VERSION }}

      # Persist ESLint's --cache between runs so unchanged files are skipped.
      # The key is unique per commit (always a miss), so restore-keys pulls
      # the most recent prior cache and ESLint only re-lints what changed; a
      # fresh entry is then saved at the end of the job.
      - name: Use ESLint cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: packages/dnb-eufemia/.eslintcache
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-eslint-eufemia-${{ github.sha }}
          restore-keys: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-eslint-eufemia-

      - name: Run lint
        run: yarn workspace @dnb/eufemia lint:ci

  lint-portal:
    name: Run portal lint
    needs: setup

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          cache-version: ${{ secrets.CACHE_VERSION }}

      - name: Use ESLint cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: packages/dnb-design-system-portal/.eslintcache
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-eslint-portal-${{ github.sha }}
          restore-keys: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-eslint-portal-

      - name: Run lint
        run: yarn workspace dnb-design-system-portal lint:ci

  typecheck:
    name: Run type checks
    needs: setup

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          cache-version: ${{ secrets.CACHE_VERSION }}

      # Persist TypeScript's incremental build info so unchanged files are
      # skipped on type-check. Unique key per commit + restore-keys pulls the
      # latest prior build info; tsc re-checks only what changed (and falls
      # back to a full check if the cache is missing or stale).
      - name: Use TypeScript build-info cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            packages/dnb-eufemia/tsconfig.tsbuildinfo
            packages/dnb-design-system-portal/tsconfig.tsbuildinfo
            tools/eufemia-llm-metadata/tsconfig.tsbuildinfo
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-tsbuildinfo-${{ github.sha }}
          restore-keys: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-tsbuildinfo-

      - name: Run type checks
        run: |
          yarn workspace @dnb/eufemia test:types
          yarn workspace dnb-design-system-portal test:types
          yarn workspace eufemia-llm-metadata test:types

  # The heavy @dnb/eufemia unit suite is split across parallel shards.
  # Keep the shard list in matrix.shard and the `--shard=N/<count>` divisor
  # below in sync. Results are aggregated by the "Run tests" job below.
  #
  # Why 4 shards: the whole workflow can never finish faster than its longest
  # non-test job (build-check ~173s, lint ~144s), so the aim is to size the
  # shards to sit just under that floor without spawning idle runners. At 4
  # shards the heaviest shard runs ~165s, right at that floor.
  #
  # This was re-checked after #8764 moved DOM-free tests to the node
  # environment: that trimmed the unit CPU cost, but the saved jsdom setup is
  # amortized across each shard's parallel workers, so it only shaves a few
  # seconds off a shard -- not enough to drop one. Fewer shards (e.g. 3) push
  # the heaviest to ~200s and make the unit tests the sole bottleneck; more
  # shards can't beat the build-check floor and just burn extra runners.
  # Re-tune only if the unit work or those other jobs change materially.
  test-shard:
    name: Run unit tests (shard ${{ matrix.shard }}/4)
    needs: setup

    runs-on: ubuntu-latest

    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: 'package.json'

      - name: Use node_modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: ${{ secrets.CACHE_VERSION }}-${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Run @dnb/eufemia unit tests (shard ${{ matrix.shard }}/4)
        run: yarn workspace @dnb/eufemia test --shard=${{ matrix.shard }}/4

  test-other:
    name: Run other tests
    needs: setup

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          cache-version: ${{ secrets.CACHE_VERSION }}

      - name: Run @dnb/eufemia build-script tests
        run: yarn workspace @dnb/eufemia test:scripts

      - name: Run portal tests
        run: yarn workspace dnb-design-system-portal test:ci

      - name: Run tooling tests
        run: |
          yarn workspace markdown-tables-utils test
          yarn workspace eufemia-llm-metadata test

  # Stable aggregate status check, so branch protection can keep requiring a
  # single "Run tests" check instead of every individual shard. Fails if any
  # of the sharded unit jobs or the other test job failed.
  test:
    name: Run tests
    needs: [test-shard, test-other]

    if: always()

    runs-on: ubuntu-latest

    timeout-minutes: 5

    steps:
      - name: Verify all test jobs passed
        run: |
          if [ "${{ needs.test-shard.result }}" != "success" ] || [ "${{ needs.test-other.result }}" != "success" ]; then
            echo "test-shard: ${{ needs.test-shard.result }}"
            echo "test-other: ${{ needs.test-other.result }}"
            exit 1
          fi
          echo "All test jobs passed."

  deps:
    name: Run dependency checks
    needs: setup

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          cache-version: ${{ secrets.CACHE_VERSION }}

      - name: Run dependency checks
        run: yarn workspace @dnb/eufemia test:deps

  build-check:
    name: Run build tests

    runs-on: ubuntu-latest

    steps:
      - name: Git checkout (with fetch-depth)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 20 # The "postbuild:ci" method "getCommittedFiles" needs all history

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          cache-version: ${{ secrets.CACHE_VERSION }}

      - name: Verify isCI
        run: yarn workspace repo-utils test:ci

      - name: Prebuild Library
        run: yarn workspace @dnb/eufemia prebuild:ci

      - name: Postbuild Library
        run: yarn workspace @dnb/eufemia postbuild:ci

      - name: Check bundle sizes
        env:
          BUNDLEWATCH_GITHUB_TOKEN: ${{ github.token }}
        run: yarn workspace @dnb/eufemia build:size
